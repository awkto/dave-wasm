# Reverse-proxy vhost for dave-wasm — install on the host (box or pro) at
#   /etc/nginx/sites-available/dave-wasm  (then symlink into sites-enabled)
# or /etc/nginx/conf.d/dave-wasm.conf, and `nginx -t && systemctl reload nginx`.
#
# Set server_name to this host's name. Both box.dnsif.ca and pro.dnsif.ca are
# single-label subdomains of dnsif.ca, so the *.dnsif.ca wildcard cert covers them.
#   - on box:  server_name box.dnsif.ca;
#   - on pro:  server_name pro.dnsif.ca;

server {
    listen 80;
    listen [::]:80;
    server_name box.dnsif.ca;          # <-- set to pro.dnsif.ca on the pro host

    # redirect everything to HTTPS
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name box.dnsif.ca;          # <-- set to pro.dnsif.ca on the pro host

    # *.dnsif.ca wildcard certificate
    ssl_certificate     /etc/ssl/dnsif.ca/fullchain.pem;
    ssl_certificate_key /etc/ssl/dnsif.ca/privkey.pem;

    # The container published on 127.0.0.1:5024 (see deploy/docker-compose.yml)
    location / {
        proxy_pass         http://127.0.0.1:5024;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # never cache the game manifest (so newly mounted games appear on restart)
    location = /games/manifest.json {
        proxy_pass http://127.0.0.1:5024;
        add_header Cache-Control "no-store";
    }
}
